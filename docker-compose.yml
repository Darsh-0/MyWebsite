version: "3.9"

services:
  website:
    build: .
    container_name: mywebsite
    ports:
      - "4173:4173"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - website